name: images

on:
  pull_request:
    paths:
      - Dockerfile
      - .dockerignore
      - package.json
      - package-lock.json
      - tsconfig.json
      - src/**
      - tests-ts/**
      - nix/**
      - .github/workflows/images.yml
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: images-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build Dockerfile runner image (${{ matrix.variant }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant:
          - base
          - codex
          - claude
          - full

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ matrix.variant }}-latest,enable={{is_default_branch}}
            type=raw,value=${{ matrix.variant }}-${{ github.sha }}
            type=raw,value=latest,enable=${{ matrix.variant == 'base' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
            type=semver,pattern=${{ matrix.variant }}-{{version}}
            type=semver,pattern=${{ matrix.variant }}-{{major}}.{{minor}}

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          build-args: |
            RUNNER_VARIANT=${{ matrix.variant }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  nix-spec:
    name: Validate Nix runner image spec
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Parse Nix dockerTools image expression
        run: nix-instantiate --parse nix/runner-images.nix >/dev/null
